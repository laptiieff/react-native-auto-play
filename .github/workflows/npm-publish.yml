name: Publish React Native Autoplay

on:
  release:
    types: [created]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine branch for release tag
        id: release-branch
        run: |
          echo "Resolving branch for tag: $GITHUB_REF_NAME"

          TAG_COMMIT=$(git rev-list -n 1 "$GITHUB_REF_NAME")

          BRANCH=$(git branch -r --contains "$TAG_COMMIT" \
            | sed 's|origin/||' \
            | grep -v 'HEAD' \
            | head -n 1)

          if [ -z "$BRANCH" ]; then
            echo "::error::Could not determine branch for tag $GITHUB_REF_NAME"
            exit 1
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "✅ Release branch: $BRANCH"

      - name: Checkout release branch
        run: |
          git checkout ${{ steps.release-branch.outputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: yarn

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install monorepo dependencies
        run: yarn install --frozen-lockfile

      - name: Update package.json version from release tag
        working-directory: ./packages/react-native-autoplay
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          node -e "
          const fs = require('fs');
          const pkg = require('./package.json');
          pkg.version = '${VERSION}';
          fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          console.log('Updated to: ${VERSION}');
          "

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Commit version bump
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "react-native-autoplay-bot"
          git config user.email "react-native-autoplay-bot@users.noreply.github.com"
      
          git remote set-url origin https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git
      
          git add packages/react-native-autoplay/package.json

          if git diff --cached --quiet; then
            echo "No version changes"
          else
            git commit -m "chore(react-native-autoplay): bump version to ${GITHUB_REF_NAME#v} [skip ci]"
            git push origin ${{ steps.release-branch.outputs.branch }}
            echo "✅ Committed to ${{ steps.release-branch.outputs.branch }}"
          fi

      - name: Yarn package install & git clean check
        working-directory: ./packages/react-native-autoplay
        run: |
          yarn install --frozen-lockfile
          if ! git diff --exit-code; then
            echo "::error::❌ Git dirty after yarn!"
            git diff
            exit 1
          fi
          echo "✅ Git clean"

      - name: Publish to npm
        working-directory: ./packages/react-native-autoplay
        run: |
          npm publish \
            --access public \
            --provenance \
            --tag ${{ github.event.release.prerelease && 'alpha' || 'latest' }} \
            --non-interactive
